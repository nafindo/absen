<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - AntyGravity Absensi</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Admin CSS -->
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="bi bi-fingerprint"></i> AntyGravity
        </div>
        <nav class="sidebar-nav">
            <a href="#dashboard" class="nav-item active"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="#laporan" class="nav-item"><i class="bi bi-file-earmark-bar-graph"></i> Laporan</a>
            <a href="#setting-karyawan" class="nav-item"><i class="bi bi-people"></i> Karyawan</a>
            <a href="#setting-toko" class="nav-item"><i class="bi bi-shop"></i> Toko</a>
            <a href="#slip-gaji" class="nav-item"><i class="bi bi-cash-stack"></i> Slip Gaji</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        
        <!-- Topbar -->
        <header class="topbar">
            <div class="page-title">Dashboard</div>
            <div class="topbar-actions">
                <div class="datetime" id="current-time">Memuat Waktu...</div>
                <button class="icon-btn position-relative">
                    <i class="bi bi-bell"></i>
                    <span class="badge-dot"></span>
                </button>
                <div class="admin-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Admin">
                    <span>Super Admin</span>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div class="content-area" id="page-content">
            <!-- Konten diisi secara dinamis oleh JS -->
        </div>
        
    </main>

    <script src="admin.js"></script>
</body>
</html>
